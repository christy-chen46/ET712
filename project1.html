<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="project1.css">
</head>
<body>

<header id="home">
    <h1>🌈 Pre-K Learning </h1>
    <p>We make learning fun!</p>
</header>

<nav aria-label="Main Navigation">
    <a href="#home">Home</a> |
    <a href="#colors">Colors</a> |
    <a href="#numbers">Numbers</a> |
    <a href="#shapes">Shapes</a> |
    <a href="#animals">Animals</a>
</nav>

<main>

    <!--Color box changes color when click button, enter color and will display incorrect or correct-->
    <section id="colors">
        <h2>What Color is this?</h2>

        <div id="colorBox" style="width:150px;height:150px;"></div>

        <button id="colorBtn">Next</button>

        <p>Type the color name:</p>
        <input type="text" id="colorInput">

        <button id="checkColor">Check Answer</button>

        <p id="colorResult"></p>
    </section>

    <!--Gallery of apple pictures to click through, enter number and will display incorrect or correct-->
    <section id="numbers">
        <h2>How many Apples?</h2>

        <div id="appleContainer"></div>

        <button id="newApples">New Apples</button>

        <p>Enter the number:</p>
        <input type="number" id="appleInput">

        <button id="checkApples">Check Answer</button>

        <p id="appleResult"></p>
    </section>

    <!--Gallery of shape pictures, enter the shape name and will display incorrect or correct-->
    <section id="shapes">
        <h2>What shape is this?</h2>

        <div id="shapeContainer"></div>

        <button id="newShape">Next Shape</button>

        <p>Enter the shape name:</p>
        <input type="text" id="shapeInput">

        <button id="checkShape">Check Answer</button>

        <p id="shapeResult"></p>
    </section>

     <!--Gallery of animal pictures, enter the animal name and will display incorrect or correct-->
    <section id="animals">
        <h2>Guess the animal!</h2>
        <!-- Placeholder for animal -->
        <div id="animalContainer">
            🐶
        </div>

        <p>Enter animal name:</p>
        <input type="text" id="animalInput">

        <button id="checkAnimal">Check Answer</button>

        <p id="animalResult"></p>
    </section>



</main>

<footer>
    <p>&copy; 2026 Pre-K Learning </p>
</footer>

<script src="project1.js"></script>
</body>
</html>
